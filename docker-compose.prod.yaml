# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yaml up -d

services:
  # -------------------------------
  # Frontend (Production)
  # -------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    image: zenvy-client:prod
    container_name: zenvy-client-prod
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - ./client/.env.production
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # Backend (Production)
  # -------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: zenvy-server:prod
    container_name: zenvy-server-prod
    env_file:
      - ./server/.env.production
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

  # ------------------------------
  # nginx Reverse Proxy
  # ------------------------------
  nginx:
    image: nginx:alpine
    container_name: zenvy-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./nginx/certs/privkey.pem:/etc/ssl/private/privkey.pem:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - client
      - server
    restart: unless-stopped

  # -------------------------------
  # Redis
  # -------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: zenvy-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # ChromaDB
  # -------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: zenvy-chromadb-prod
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    
volumes:
  redis_data:
  chromadb_data:

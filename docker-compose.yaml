# Remove the version line - it's obsolete in Docker Compose v2+

services:
  # -------------------------------
  # Frontend
  # -------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    image: zenvy-client:latest
    container_name: zenvy-client
    # Don't expose port externally - nginx will handle it
    # ports:
    #   - "3000:3000"
    environment:
      - NODE_ENV=production
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - ./client/.env.production
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # Backend
  # -------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    image: zenvy-server:latest
    container_name: zenvy-server
    # Don't expose port externally - nginx will handle it
    # ports:
    #   - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

  # ------------------------------
  # nginx Reverse Proxy
  # ------------------------------
  nginx:
    image: nginx:alpine
    container_name: zenvy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx config - mount the FILE directly
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      
      # SSL certificates (Cloudflare origin certificates)
      - ./nginx/certs/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./nginx/certs/privkey.pem:/etc/ssl/private/privkey.pem:ro
      
      # Logs (optional - for debugging)
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - client
      - server
    restart: unless-stopped

  # -------------------------------
  # Redis
  # -------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: zenvy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # ChromaDB
  # -------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: zenvy-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    
# -------------------------------
# Volumes
# -------------------------------
volumes:
  redis_data:
  chromadb_data:
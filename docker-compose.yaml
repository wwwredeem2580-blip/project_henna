# Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yaml up -d

services:
  # -------------------------------
  # Frontend (Development)
  # -------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    image: zenvy-client:dev
    container_name: zenvy-client-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - ./client/.env.local
    volumes:
      - ./client:/src:delegated
      - /src/node_modules
      - /src/.next
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # Backend (Development)
  # -------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    image: zenvy-server:dev
    container_name: zenvy-server-dev
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./server:/app:delegated
      - /app/node_modules
      - /app/dist
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

  # -------------------------------
  # Redis
  # -------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: zenvy-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------
  # ChromaDB
  # -------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: zenvy-chromadb-dev
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
    
volumes:
  redis_data:
  chromadb_data:

# ------------------------------
# HTTP → HTTPS redirect
# ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name zenvy.com.bd www.zenvy.com.bd;

    # Redirect all traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ------------------------------
# HTTPS server
# ------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zenvy.com.bd www.zenvy.com.bd;

    # SSL certificates from Cloudflare origin
    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ------------------------------
    # Frontend (Next.js)
    # ------------------------------
    location / {
        proxy_pass http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js live features
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------
    # Backend API
    # ------------------------------
    location /api/ {
        proxy_pass http://server:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional: static files served directly by Nginx (Next.js)
    location /_next/ {
        proxy_pass http://client:3000/_next/;
    }
}

# ------------------------------
# WebSocket upgrade mapping
# ------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ------------------------------
# HTTP → HTTPS redirect
# ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name zenvy.com.bd www.zenvy.com.bd;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ------------------------------
# HTTPS server
# ------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zenvy.com.bd www.zenvy.com.bd;

    # SSL certificates from Cloudflare origin
    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client body size (for file uploads)
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ------------------------------
    # Backend API (BEFORE frontend catch-all)
    # ------------------------------
    location /api/ {
        # If your backend routes are like /api/users, /api/events
        proxy_pass http://server:3001;  # No trailing slash = keeps /api/
        
        # OR if your backend routes are /users, /events (without /api/)
        # proxy_pass http://server:3001/;  # With trailing slash = removes /api/

        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for real-time features
        proxy_buffering off;
    }

    # ------------------------------
    # Socket.io (if needed)
    # ------------------------------
    location /socket.io/ {
        proxy_pass http://server:3001/socket.io/;
        proxy_http_version 1.1;
        
        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important for Socket.io
        proxy_buffering off;
        proxy_cache off;
        
        # Long timeouts for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------
    # Next.js static files (optimization)
    # ------------------------------
    location /_next/static/ {
        proxy_pass http://client:3000/_next/static/;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /_next/image {
        proxy_pass http://client:3000/_next/image;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
    }

    # ------------------------------
    # Frontend (Next.js) - Catch-all LAST
    # ------------------------------
    location / {
        proxy_pass http://client:3000;
        proxy_http_version 1.1;
        
        # WebSocket support (for Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
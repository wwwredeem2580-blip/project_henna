# ------------------------------
# Cache configuration
# ------------------------------
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

# ------------------------------
# Gzip compression
# ------------------------------
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_proxied any;
gzip_disable "msie6";

# ------------------------------
# Upstream definitions for load balancing
# ------------------------------
upstream client_upstream {
    # Docker Swarm will automatically load balance across replicas
    server client:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream server_upstream {
    # Docker Swarm will automatically load balance across replicas
    server server:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ------------------------------
# HTTP → HTTPS redirect
# ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name zenvy.com.bd www.zenvy.com.bd scanner.zenvy.com.bd;

    return 301 https://$host$request_uri;
}

# ------------------------------
# HTTPS server
# ------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zenvy.com.bd www.zenvy.com.bd scanner.zenvy.com.bd;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ------------------------------
    # Health check endpoint (no logging)
    # ------------------------------
    location /health {
        proxy_pass http://server_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        error_log off;
    }

    # ------------------------------
    # PDF Application API
    # ------------------------------
    location /api/pdf {
        proxy_pass http://client_upstream;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ------------------------------
    # Backend API - Public endpoints (cached)
    # ------------------------------
    location ~ ^/api/(events|tickets|public)/ {
        proxy_pass http://server_upstream;
        proxy_http_version 1.1;
        
        # Cache configuration for GET requests only
        proxy_cache api_cache;
        proxy_cache_methods GET;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Retry on next upstream if one fails
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ------------------------------
    # Backend API - Private endpoints (no cache)
    # ------------------------------
    location /api/ {
        proxy_pass http://server_upstream/;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering off;
        
        # Retry on next upstream if one fails
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ------------------------------
    # Socket.io
    # ------------------------------
    location /socket.io/ {
        proxy_pass http://server_upstream/socket.io/;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_cache off;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Sticky sessions for websockets (optional but recommended)
        # Uncomment if you experience websocket connection issues
        # ip_hash;
    }

    # ------------------------------
    # Next.js static files
    # ------------------------------
    location /_next/static/ {
        proxy_pass http://client_upstream/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /_next/image {
        proxy_pass http://client_upstream/_next/image;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
    }

    # ------------------------------
    # Frontend (Next.js)
    # ------------------------------
    location / {
        proxy_pass http://client_upstream;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Retry on next upstream if one fails
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}